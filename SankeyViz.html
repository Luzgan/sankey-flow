<!DOCTYPE html>
<html>
  <head>
    <title>Sankey Chart Extension</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Extensions Library -->
    <script src="./../lib/tableau.extensions.1.latest.min.js"></script>

    <!-- Our extension's code (bundled with all dependencies) -->
    <script src="./SankeyViz.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          sans-serif;
      }

      .tableau-worksheet {
        width: 100%;
        height: 100%;
        position: fixed;
      }

      .selection {
        fill: #4e79a7;
        fill-opacity: 1;
        cursor: pointer;
      }

      .selectionOutline {
        stroke-width: 4;
        stroke: black;
        fill: none;
      }

      .highlighting {
        fill: none;
        stroke-width: 2;
        stroke: #333;
        cursor: pointer;
      }

      .node-label {
        font-size: 12px;
        font-weight: 500;
        pointer-events: none;
      }

      .level-label {
        font-size: 14px;
        font-weight: bold;
        text-anchor: middle;
      }

      .link {
        fill: none;
        stroke-opacity: 0.6;
        cursor: pointer;
      }

      .link:hover {
        stroke-opacity: 0.8;
      }

      .node {
        cursor: pointer;
      }

      .node:hover {
        stroke-width: 2;
      }

      #content {
        width: 100%;
        height: 100%;
        position: fixed;
      }

      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        font-size: 16px;
        color: #666;
      }

      /* Configuration Dialog Styles */
      .configuration-dialog {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .configuration-dialog .dialog-content {
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        overflow-y: auto;
      }

      .dialog-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px 16px;
        border-bottom: 1px solid #e0e0e0;
      }

      .dialog-header h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #333;
      }

      .close-button {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #666;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
      }

      .close-button:hover {
        background-color: #f5f5f5;
        color: #333;
      }

      .dialog-content {
        padding: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
      }

      .form-group select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        background-color: white;
      }

      .form-group select:focus {
        outline: none;
        border-color: #4e79a7;
        box-shadow: 0 0 0 2px rgba(78, 121, 167, 0.2);
      }

      .help-text {
        margin-top: 6px;
        font-size: 12px;
        color: #666;
        line-height: 1.4;
      }

      .dialog-footer {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        padding: 16px 24px 24px;
        border-top: 1px solid #e0e0e0;
      }

      .cancel-button,
      .save-button {
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid;
        transition: all 0.2s;
      }

      .cancel-button {
        background: white;
        border-color: #ddd;
        color: #666;
      }

      .cancel-button:hover {
        background-color: #f5f5f5;
        border-color: #ccc;
      }

      .save-button {
        background: #4e79a7;
        border-color: #4e79a7;
        color: white;
      }

      .save-button:hover {
        background: #3d6a96;
        border-color: #3d6a96;
      }
    </style>
  </head>
  <body class="tableau-worksheet">
    <div id="content"></div>
  </body>
</html>
