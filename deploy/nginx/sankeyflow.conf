server {
    listen 80;
    server_name sankeyflow.lukholc.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sankeyflow.lukholc.me;

    ssl_certificate /etc/letsencrypt/live/sankeyflow.lukholc.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sankeyflow.lukholc.me/privkey.pem;

    root /var/www/sankeyflow;
    index SankeyViz.html;

    location / {
        try_files $uri $uri/ =404;
        add_header Access-Control-Allow-Origin *;
    }

    # Cache static JS bundles
    location ~* \.js$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin *;
    }
}
